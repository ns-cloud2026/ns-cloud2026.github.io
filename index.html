<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting | NS Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Simple spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Subtle fade in */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-800 antialiased selection:bg-blue-100 selection:text-blue-900">

    <!-- Minimal Header -->
    <header class="w-full p-6 flex justify-between items-center absolute top-0">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 bg-blue-600 rounded flex items-center justify-center">
                <span class="text-white text-[10px] font-bold">NS</span>
            </div>
            <span class="font-medium text-sm text-gray-700">Gateway</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            <span class="text-xs text-gray-500 font-medium">System Operational</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 md:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] max-w-sm w-full border border-gray-100 fade-in">
            
            <div class="flex flex-col items-center text-center">
                <div class="spinner mb-6"></div>
                
                <h1 class="text-xl font-semibold text-gray-900 mb-2">กำลังพาคุณไปยังหน้าหมายเหตุ</h1>
                <p class="text-sm text-gray-500 mb-6">
                    กรุณารอสักครู่ ระบบกำลังเชื่อมต่อไปยังเซิร์ฟเวอร์ที่ปลอดภัย
                </p>

                <!-- Countdown & Status -->
                <div class="w-full bg-gray-50 rounded-xl p-4 mb-6">
                    <div class="flex flex-col items-center justify-center gap-1">
                        <span class="text-xs text-gray-500 uppercase tracking-wide font-medium">เปลี่ยนเส้นทางใน</span>
                        <div class="text-3xl font-semibold text-blue-600">
                            <span id="countdown">3</span>
                        </div>
                    </div>
                </div>

                <!-- Status Badge -->
                <div id="status-badge" class="inline-flex items-center gap-2 text-xs font-medium text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full mb-6 transition-colors">
                    <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
                    <span id="status-text">กำลังดึงข้อมูลเซิร์ฟเวอร์...</span>
                </div>

                <!-- Manual Redirect -->
                <button id="manual-redirect" class="text-sm text-gray-400 hover:text-blue-600 transition-colors">
                    คลิกที่นี่ หากระบบไม่เปลี่ยนเส้นทางอัตโนมัติ
                </button>
            </div>
            
            <!-- Server Info (Minimal) -->
            <div class="mt-8 pt-4 border-t border-gray-100 flex justify-between text-[10px] text-gray-400">
                <div class="flex gap-1 items-center">
                    <span>Sync:</span>
                    <span id="last-update">--:--:--</span>
                </div>
                <div>Region: TH-BKK1</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full p-6 text-center text-xs text-gray-400">
        &copy; 2025 NS Enterprise Solutions.
    </footer>

    <script>
        // =================================================================
        // ⚙️ การตั้งค่าการทำงาน
        // =================================================================
        const config = {
            isDynamic: true, 
            dynamicUrlSource: "https://raw.githubusercontent.com/nbfdev/servers/main/url.txt",
            staticUrl: "https://your-server.com",
            redirectDelay: 3,
            autoRedirect: true
        };
        // =================================================================

        const statusBadge = document.getElementById("status-badge");
        const statusDot = document.getElementById("status-dot");
        const statusText = document.getElementById("status-text");
        const lastUpdateTxt = document.getElementById("last-update");
        const countdownSpan = document.getElementById("countdown");
        const manualBtn = document.getElementById("manual-redirect");

        let targetUrl = null;
        let redirectTimeout = null;
        let countdownInterval = null;

        function updateUI(state, url = null) {
            const now = new Date();
            lastUpdateTxt.innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            if (state === 'ready' && url) {
                statusBadge.className = "inline-flex items-center gap-2 text-xs font-medium text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full mb-6 transition-colors";
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500";
                statusText.innerText = "เชื่อมต่อสำเร็จ กำลังเปลี่ยนเส้นทาง";
                targetUrl = url;
                
                if (config.autoRedirect) {
                    startRedirectCountdown(url);
                }
            } 
            else if (state === 'waiting') {
                statusBadge.className = "inline-flex items-center gap-2 text-xs font-medium text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full mb-6 transition-colors";
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse";
                statusText.innerText = "กำลังดึงข้อมูลเซิร์ฟเวอร์...";
            } 
            else if (state === 'error') {
                statusBadge.className = "inline-flex items-center gap-2 text-xs font-medium text-red-600 bg-red-50 px-3 py-1.5 rounded-full mb-6 transition-colors";
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-red-500";
                statusText.innerText = "ไม่พบเซิร์ฟเวอร์ หรือลิงก์เสีย";
            }
        }

        function startRedirectCountdown(url) {
            let remaining = config.redirectDelay;
            countdownSpan.innerText = remaining;
            
            if (redirectTimeout) clearTimeout(redirectTimeout);
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                remaining--;
                if (remaining >= 0) {
                    countdownSpan.innerText = remaining;
                }
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);
            
            redirectTimeout = setTimeout(() => {
                performRedirect(url);
            }, config.redirectDelay * 1000);
        }
        
        function performRedirect(url) {
            if (url && url !== "#") {
                window.location.href = url;
            } else {
                statusText.innerText = "URL ไม่ถูกต้อง";
                statusBadge.className = "inline-flex items-center gap-2 text-xs font-medium text-red-600 bg-red-50 px-3 py-1.5 rounded-full mb-6 transition-colors";
            }
        }

        async function getLatestUrl() {
            if (!config.isDynamic) {
                if (config.staticUrl && config.staticUrl.startsWith("https://")) {
                    updateUI('ready', config.staticUrl);
                } else if (config.staticUrl && config.staticUrl.startsWith("http://")) {
                    const httpsUrl = config.staticUrl.replace("http://", "https://");
                    updateUI('ready', httpsUrl);
                } else {
                    updateUI('error');
                }
                return;
            }

            try {
                updateUI('waiting');
                const response = await fetch(config.dynamicUrlSource, { cache: 'no-store' });
                if (!response.ok) throw new Error("Network response was not ok");
                const latestUrl = await response.text();
                const cleanUrl = latestUrl.trim();

                if (cleanUrl.startsWith("https://")) {
                    updateUI('ready', cleanUrl);
                } else if (cleanUrl.startsWith("http://")) {
                    const httpsUrl = cleanUrl.replace("http://", "https://");
                    updateUI('ready', httpsUrl);
                } else if (cleanUrl !== "") {
                    const fixedUrl = "https://" + cleanUrl;
                    updateUI('ready', fixedUrl);
                } else {
                    updateUI('error');
                }
            } catch (err) {
                console.error("ดึงข้อมูลไม่สำเร็จ:", err);
                updateUI('error');
            }
        }

        manualBtn.addEventListener('click', () => {
            if (targetUrl && targetUrl !== "#") {
                if (redirectTimeout) clearTimeout(redirectTimeout);
                if (countdownInterval) clearInterval(countdownInterval);
                performRedirect(targetUrl);
            } else {
                statusText.innerText = "ไม่พบ URL ปลายทาง";
                statusBadge.className = "inline-flex items-center gap-2 text-xs font-medium text-red-600 bg-red-50 px-3 py-1.5 rounded-full mb-6 transition-colors";
            }
        });

        getLatestUrl();
        
        if (config.isDynamic) {
            setInterval(() => {
                if (targetUrl === null && config.autoRedirect) {
                    getLatestUrl();
                }
            }, 30000);
        }
    </script>
</body>
</html>
