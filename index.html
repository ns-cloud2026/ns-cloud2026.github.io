<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>แสดงเว็บจาก URL ที่กำหนด</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        h1 {
            background: #333;
            color: white;
            margin: 0;
            padding: 15px;
            font-size: 18px;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }
        .error-note {
            padding: 10px;
            background: #ffeeaa;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="error-note">
        ⚠️ หากไม่แสดงเนื้อหา อาจเป็นเพราะเว็บไซต์นั้นไม่อนุญาตให้ฝัง (X-Frame-Options) 
        หรือลิงก์หมดอายุแล้ว (Cloudflare Tunnel อาจปิดตัว)
    </div>
    <iframe src="https://routine-customs-checked-enhance.trycloudflare.com" title="เว็บจาก URL ที่กำหนด"></iframe>
</body>
</html>
